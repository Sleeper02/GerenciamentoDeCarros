<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <title>Alterar Cliente</title>
    <link th:href="@{/css/style.css(v=2)}" rel="stylesheet">
</head>
<body>
<h1>Alterar Cliente</h1>
<div class="form-container">
    <div th:if="${mensagem}" class="mensagem" th:text="${mensagem}"></div>
    <form th:action="@{/cliente/ui/atualizar/{id}(id=${cliente.id})}" th:object="${cliente}" method="POST">
        <input type="hidden" th:field="*{CPF}" />
        <label for="nome">Nome:</label>
        <input type="text" id="nome" th:field="*{nome}" required/>
        <label for="telefone">Telefone:</label>
        <input type="text" id="telefone" th:field="*{telefone}">
        <label for="email">Email</label>
        <input type="email" id="email" th:field="*{email}">
        <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color: red; font-size: 12px; margin-bottom: 10px; display: block;"></span>
        <label for="endereco">Endereço</label>
        <input type="text" id="endereco" th:field="*{endereco}">
        <label for="carro">Carro alugado</label>
        <select name="carro" th:field="*{carro.id}"required>
            <option value="">-- Nenhuma carro alugado no momento --</option>
            <option th:each="c : ${carro}"
                    th:value="${c.id}"
                    th:text="${c.modelo} + ' ' + ${c.placa}">
            </option>
        </select>
        <button type="submit">Salvar</button>
    </form>
    <a th:href="@{/cliente/ui/listar/all}">Voltar para a lista de Clientes</a>
</div>
</body>
</html>
